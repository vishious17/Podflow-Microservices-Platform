global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3000']

  - job_name: 'honeypot'
    static_configs:
      - targets: ['honeypot:8888']
    metrics_path: /metrics

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: /metrics


