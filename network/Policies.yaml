# Zero-trust network policy specification (Calico CRD syntax).
# Enforced only when deployed to Kubernetes with Calico CNI.
# In the current Podman setup, enforcement is via bridge network
# segmentation and honeypot_net isolation in podman-compose.yml.
#
# Connectivity summary:
#   gateway  -> backend (5000), user-service (3000), data-service (4000)
#   backend  -> ingress from gateway + prometheus only
#   honeypot -> open ingress (trap), no egress to internal services
#   default  -> deny all

apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: gateway-shield
  namespace: podflow
spec:
  selector: podflow.tier == 'frontend'
  types:
    - Ingress
    - Egress
  ingress:
    - action: Allow
      protocol: TCP
      destination:
        ports: [8080]
    - action: Allow
      protocol: TCP
      source:
        selector: app == 'prometheus'
  egress:
    - action: Allow
      protocol: TCP
      destination:
        selector: podflow.tier == 'backend'
        ports: [5000]
    - action: Allow
      protocol: TCP
      destination:
        selector: podflow.tier == 'user-service'
        ports: [3000]
    - action: Allow
      protocol: TCP
      destination:
        selector: podflow.tier == 'data-service'
        ports: [4000]
    - action: Allow
      protocol: UDP
      destination:
        ports: [53]

---

apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: app-data-protection
  namespace: podflow
spec:
  selector: podflow.tier == 'backend'
  types:
    - Ingress
    - Egress
  ingress:
    - action: Allow
      protocol: TCP
      source:
        selector: podflow.tier == 'frontend'
      destination:
        ports: [5000]
    - action: Allow
      protocol: TCP
      source:
        selector: app == 'prometheus'
      destination:
        ports: [5000]
  egress:
    - action: Allow
      protocol: UDP
      destination:
        ports: [53]
    - action: Deny

---

apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: intrusion-trap-isolation
  namespace: podflow
spec:
  selector: podflow.service == 'honeypot'
  types:
    - Ingress
    - Egress
  ingress:
    - action: Allow
      protocol: TCP
      destination:
        ports: [2222, 8888]
    - action: Allow
      protocol: TCP
      source:
        selector: app == 'prometheus'
      destination:
        ports: [8888]
  egress:
    - action: Allow
      protocol: UDP
      destination:
        ports: [53]
    - action: Deny

---

apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: default-security-lockout
spec:
  order: 2000
  types:
    - Ingress
    - Egress
  ingress:
    - action: Deny
  egress:
    - action: Deny
