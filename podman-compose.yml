version: "3.8"

services:

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://backend:5000
    networks:
      - public_net
      - service_net

  user-service:
    build: ./services/user-service
    networks:
      - service_net

  backend:
    build: ./services/backend
    ports:
      - "5000:5000"
    networks:
      - service_net

  prometheus:
    image: docker.io/prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - service_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - service_net

  honeypot:
    build: ./services/honeypot
    ports:
      - "8888:8888"
    networks:
      - service_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


networks:
  public_net:
    driver: bridge

  service_net:
    driver: bridge