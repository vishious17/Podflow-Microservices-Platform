version: "3.8"

services:

  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB:       podflow
      POSTGRES_USER:     podflow
      POSTGRES_PASSWORD: podflow123
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - service_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podflow -d podflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_URL=http://user-service:3000
      - BACKEND_URL=http://backend:5000
      - DATA_SERVICE_URL=http://data-service:4000
    networks:
      - public_net
      - service_net
    depends_on:
      - user-service
      - backend
      - data-service
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=podflow
      - DB_USER=podflow
      - DB_PASSWORD=podflow123
    networks:
      - service_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./services/backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=podflow
      - DB_USER=podflow
      - DB_PASSWORD=podflow123
    networks:
      - service_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  data-service:
    build: ./services/data-service
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=podflow
      - DB_USER=podflow
      - DB_PASSWORD=podflow123
    networks:
      - service_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  honeypot:
    build: ./services/honeypot
    ports:
      - "8888:8888"
      - "2222:2222"
    volumes:
      - honeypot_data:/data
    networks:
      - honeypot_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: docker.io/prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - service_net
      - honeypot_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - service_net
    restart: unless-stopped

networks:
  public_net:
    driver: bridge

  service_net:
    driver: bridge

  honeypot_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  honeypot_data:
